<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS 사이버범죄 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: #1e3a5f;
  --accent: #00d4ff;
  --accent2: #ff6b35;
  --accent3: #7c3aed;
  --correct: #10b981;
  --wrong: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --glow: 0 0 20px rgba(0,212,255,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.05) 0%, transparent 60%);}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);background-size:40px 40px;}
.container{max-width:760px;margin:0 auto;padding:20px;position:relative;z-index:1}
.screen{display:none;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.intro-header{text-align:center;padding:60px 0 40px}
.badge{display:inline-block;background:linear-gradient(135deg, rgba(0,212,255,0.15), rgba(124,58,237,0.15));border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:3px;padding:6px 16px;border-radius:20px;margin-bottom:24px;text-transform:uppercase;}
.intro-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(28px,6vw,52px);line-height:1.15;margin-bottom:16px;background:linear-gradient(135deg,#ffffff 0%, var(--accent) 60%, var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.intro-sub{color:var(--muted);font-size:15px;line-height:1.7;max-width:500px;margin:0 auto 40px}
.info-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 16px;text-align:center}
.info-card .icon{font-size:24px;margin-bottom:8px}
.info-card .label{font-size:12px;color:var(--muted);margin-bottom:4px}
.info-card .value{font-size:18px;font-weight:700;color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 36px;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;border:none;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:white;box-shadow:var(--glow)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,0.5)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-full{width:100%}
.quiz-header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 24px;gap:16px}
.progress-wrap{flex:1}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));transition:width .4s}
.score-badge{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;color:var(--accent)}
.category-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);padding:4px 12px;border-radius:20px;margin-bottom:16px}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px}
.question-num{font-size:11px;color:var(--muted);margin-bottom:12px;letter-spacing:1px}
.question-text{font-size:clamp(16px,2.5vw,20px);font-weight:700;line-height:1.6;color:white}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:14px;font-size:15px;line-height:1.5}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(0,212,255,0.06);transform:translateX(4px)}
.option .opt-letter{min-width:28px;height:28px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.option.correct{border-color:var(--correct);background:rgba(16,185,129,0.1)}
.option.correct .opt-letter{background:var(--correct);color:white}
.option.wrong{border-color:var(--wrong);background:rgba(239,68,68,0.1)}
.option.wrong .opt-letter{background:var(--wrong);color:white}
.option.disabled{cursor:default}
.feedback-box{border-radius:12px;padding:20px 24px;font-size:14px;line-height:1.7;margin-bottom:20px;display:none;border-left:4px solid}
.feedback-box.correct-fb{background:rgba(16,185,129,0.1);border-color:var(--correct)}
.feedback-box.wrong-fb{background:rgba(239,68,68,0.08);border-color:var(--wrong)}
.feedback-box.show{display:block;animation:fadeIn 0.3s ease}
.fb-label{font-weight:700;font-size:15px;margin-bottom:6px}
.correct-fb .fb-label{color:var(--correct)}
.wrong-fb .fb-label{color:var(--wrong)}
/* Result */
.result-hero{text-align:center;padding:48px 0 32px}
.score-ring{width:160px;height:160px;margin:0 auto 24px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring-num{font-family:'Black Han Sans',sans-serif;font-size:42px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.score-ring-label{font-size:12px;color:var(--muted);margin-top:2px}
.result-grade{font-family:'Black Han Sans',sans-serif;font-size:clamp(20px,4vw,32px);margin-bottom:12px}
.result-desc{color:var(--muted);font-size:14px;max-width:480px;margin:0 auto 32px;line-height:1.7}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-card .s-val{font-size:28px;font-weight:900;margin-bottom:4px}
.stat-card .s-lbl{font-size:12px;color:var(--muted)}
.stat-correct .s-val{color:var(--correct)}
.stat-wrong .s-val{color:var(--wrong)}
.stat-score .s-val{color:var(--accent)}
/* Wrong review */
.wrong-review{background:var(--surface);border:1px solid rgba(239,68,68,0.3);border-radius:16px;padding:24px;margin-bottom:24px}
.wrong-review h3{font-size:14px;font-weight:700;color:var(--wrong);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.wrong-item{background:var(--surface2);border-radius:10px;padding:14px 16px;margin-bottom:10px;font-size:13px;line-height:1.6}
.wrong-q{color:var(--text);font-weight:600;margin-bottom:6px}
.wrong-ans{color:#f87171;font-size:12px;margin-bottom:4px}
.wrong-correct{color:#34d399;font-size:12px}
/* Edu */
.edu-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.edu-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;transition:background .2s;gap:12px}
.edu-header:hover{background:rgba(255,255,255,0.03)}
.edu-header-left{display:flex;align-items:center;gap:14px}
.edu-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.edu-title{font-weight:700;font-size:15px}
.edu-tag{font-size:11px;color:var(--muted);margin-top:2px}
.edu-chevron{color:var(--muted);transition:transform .3s;font-size:18px}
.edu-section.open .edu-chevron{transform:rotate(180deg)}
.edu-body{display:none;padding:0 24px 24px;border-top:1px solid var(--border);font-size:14px;line-height:1.8;color:#94a3b8}
.edu-section.open .edu-body{display:block;animation:fadeIn .3s ease}
.edu-body h4{color:var(--text);font-size:13px;font-weight:700;margin:16px 0 8px}
.edu-body ul{padding-left:20px}
.edu-body ul li{margin-bottom:6px}
.edu-body .highlight{background:rgba(0,212,255,0.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;color:var(--text);margin:12px 0;font-size:13px}
.chip{display:inline-block;background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin:2px}
.chip.red{background:rgba(239,68,68,0.1);color:#f87171;border-color:rgba(239,68,68,0.2)}
.chip.green{background:rgba(16,185,129,0.1);color:#34d399;border-color:rgba(16,185,129,0.2)}
/* Share */
.share-box{background:linear-gradient(135deg, rgba(0,212,255,0.08), rgba(124,58,237,0.08));border:1px solid rgba(0,212,255,0.25);border-radius:16px;padding:24px;margin:24px 0;text-align:center}
.share-title{font-size:18px;font-weight:800;margin-bottom:10px}
.share-desc{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.share-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.copy-alert{margin-top:12px;font-size:13px;color:#34d399;display:none}
.action-row{display:flex;gap:12px;flex-wrap:wrap;padding:32px 0 60px;justify-content:center}
.edu-section-title{font-size:18px;font-weight:700;margin-bottom:4px;padding:8px 0 20px}
.edu-section-sub{font-size:13px;color:var(--muted);margin-bottom:16px}
@media(max-width:600px){.question-card{padding:20px}.option{padding:12px 16px}.info-cards{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

<!-- INTRO -->
<div id="screen-intro" class="screen active">
  <div class="intro-header">
    <div class="badge">🔐 SNS 사이버범죄 퀴즈</div>
    <div class="intro-title">SNS 사이버범죄<br>나는 얼마나 알고 있을까?</div>
    <p class="intro-sub">퀴즈를 풀고 나면 유형별 교육 자료로 사이버범죄를 더 깊이 이해할 수 있어요. 10문제, 5분이면 충분합니다.</p>
    <div class="info-cards">
      <div class="info-card"><div class="icon">📝</div><div class="label">문제 수</div><div class="value">10문항</div></div>
      <div class="info-card"><div class="icon">⏱</div><div class="label">소요 시간</div><div class="value">약 5분</div></div>
      <div class="info-card"><div class="icon">🎓</div><div class="label">결과 후</div><div class="value">맞춤 교육</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">테스트 시작하기 →</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-label"><span id="prog-text">1 / 10</span><span id="prog-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">점수 <span id="live-score">0</span>점</div>
  </div>
  <div id="category-tag" class="category-tag"></div>
  <div class="question-card">
    <div class="question-num" id="q-num"></div>
    <div class="question-text" id="q-text"></div>
  </div>
  <div class="options" id="options-list"></div>
  <div class="feedback-box" id="feedback-box">
    <div class="fb-label" id="fb-title"></div>
    <div id="fb-content"></div>
  </div>
  <button class="btn btn-primary btn-full" id="next-btn" onclick="nextQuestion()" style="display:none">다음 문제 →</button>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-hero">
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="#1a2236" stroke-width="10"/>
        <circle cx="80" cy="80" r="68" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="427" id="ring-fill" stroke-dashoffset="427"/>
        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
      </svg>
      <div class="score-ring-val">
        <div class="score-ring-num" id="r-score">0</div>
        <div class="score-ring-label">/ 100점</div>
      </div>
    </div>
    <div class="result-grade" id="r-grade"></div>
    <p class="result-desc" id="r-desc"></p>
  </div>
  <div class="stats-row">
    <div class="stat-card stat-correct"><div class="s-val" id="r-correct">0</div><div class="s-lbl">정답</div></div>
    <div class="stat-card stat-wrong"><div class="s-val" id="r-wrong">0</div><div class="s-lbl">오답</div></div>
    <div class="stat-card stat-score"><div class="s-val" id="r-pct">0%</div><div class="s-lbl">정답률</div></div>
  </div>
  <div id="wrong-review-area"></div>
  <div class="share-box">
    <div class="share-title">📲 결과 공유하기</div>
    <div class="share-desc">친구들에게 보안 인식 수준을 공유하고 함께 테스트해보세요!</div>
    <div class="share-buttons">
      <button class="btn btn-primary" onclick="shareResult()">🔗 공유하기</button>
      <button class="btn btn-outline" onclick="copyLink()">링크 복사</button>
    </div>
    <div class="copy-alert" id="copy-alert">✅ 링크가 복사되었습니다!</div>
  </div>
  <div style="padding:8px 0 20px">
    <div class="edu-section-title">📚 맞춤 교육 자료</div>
    <div class="edu-section-sub">틀린 문제와 관련된 항목을 먼저 확인해보세요.</div>
  </div>
  <div id="edu-sections"></div>
  <div class="action-row">
    <button class="btn btn-outline" onclick="restartQuiz()">🔄 다시 풀기</button>
    <button class="btn btn-primary" onclick="window.scrollTo({top:0,behavior:'smooth'})">📖 교육 자료 보기 ↑</button>
  </div>
</div>

</div>
<script>
const QUESTIONS=[{id:1,category:"피싱 & 계정 보안",icon:"🎣",question:"친구로부터 메시지가 왔습니다. \"계정이 정지됩니다. 여기를 클릭해서 인증해주세요\" 라는 링크가 포함되어 있습니다. 어떻게 해야 할까요?",options:["빨리 클릭해서 계정을 보호한다","전화나 다른 방법으로 친구에게 직접 확인한다","링크를 다른 친구에게 공유해서 확인을 부탁한다","일단 클릭해보고 이상하면 닫는다"],answer:1,explanation:"이는 피싱(Phishing)의 전형적인 수법입니다. '긴급', '인증', '정지' 같은 표현으로 즉각 반응을 유도합니다. 반드시 다른 채널(전화, 실제 앱 로그인)로 직접 확인해야 합니다. 출처 불명 링크는 절대 클릭하지 마세요.",edu:"phishing"},{id:2,category:"계정 보안",icon:"🔑",question:"2단계 인증(2FA)에 대한 설명 중 올바른 것은?",options:["비밀번호가 강하면 2단계 인증은 필요 없다","불편하더라도 중요 계정에는 반드시 설정하는 것이 좋다","문자로 받는 인증번호를 타인과 공유해도 된다","2단계 인증을 설정하면 계정이 100% 안전하다"],answer:1,explanation:"2단계 인증은 비밀번호가 유출되더라도 추가 보호막이 됩니다. 불편하더라도 SNS, 금융 계정 등 중요한 곳에는 반드시 설정해야 합니다. 인증번호는 그 어떤 이유로도 타인과 공유해선 안 됩니다.",edu:"account"},{id:3,category:"투자 사기",icon:"💰",question:"SNS에서 '원금 보장, 월 30% 수익 보장'이라는 투자 리딩방 초대를 받았습니다. 단체방에는 수익 인증 사진이 가득합니다. 어떻게 판단해야 할까요?",options:["수익 인증이 많으니 믿을 수 있다","일단 소액으로 테스트해본다","원금·수익 보장은 불가능하므로 사기 가능성이 매우 높다","유명 사람이 운영하면 안전하다"],answer:2,explanation:"'원금 보장', '수익 보장'은 금융에서 불법에 가깝습니다. 단체방의 수익 인증은 가짜이거나 초반 조작된 사례일 수 있습니다. 고수익을 강조하고 빠른 입금을 유도하는 것은 투자·리딩방 사기의 핵심 특징입니다.",edu:"invest"},{id:4,category:"로맨스 스캠",icon:"💔",question:"SNS에서 알게 된 해외 군인이라는 사람이 빠르게 친해지더니 갑자기 '비상 상황이 생겨 돈이 급히 필요하다'고 합니다. 어떻게 해야 할까요?",options:["믿을 만한 사람이니 도와준다","실제 만남 없이 금전을 요구하므로 로맨스 스캠을 의심한다","소액이면 괜찮다","상대방의 계좌를 확인하면 안전하다"],answer:1,explanation:"해외 군인·사업가·의사 등 신원 확인이 어려운 설정, 빠른 친밀감 형성, 갑작스러운 금전 요구는 로맨스 스캠의 핵심 패턴입니다. 실제 만남 없이 금전을 요구하면 무조건 의심해야 합니다.",edu:"romance"},{id:5,category:"명예훼손",icon:"⚖️",question:"화가 나서 지인에 대한 사실이 아닌 내용을 SNS에 게시했습니다. 익명 계정이라 괜찮을까요?",options:["익명이면 법적 책임이 없다","온라인 명예훼손은 익명이라도 처벌받을 수 있다","나중에 삭제하면 기록이 사라진다","개인 계정이면 문제없다"],answer:1,explanation:"익명 계정이라도 IP 추적 등을 통해 신원 파악이 가능합니다. 허위사실 유포는 형사처벌 대상이며, 삭제해도 캡처 등으로 증거가 남을 수 있습니다. 온라인에서도 현실과 동일한 법적 책임이 따릅니다.",edu:"defamation"},{id:6,category:"불법 촬영물 유포",icon:"📸",question:"친구가 공유한 영상을 재미있어서 다른 단체방에 퍼뜨렸습니다. 처음엔 몰래 촬영된 영상이었다는 것을 나중에 알았습니다. 어떻게 해야 할까요?",options:["처음에 몰랐으니 책임이 없다","즉시 삭제하고, 상황에 따라 법적 책임이 발생할 수 있음을 인지한다","이미 퍼진 거라 어쩔 수 없다","원본을 올린 사람만 처벌된다"],answer:1,explanation:"불법 촬영물의 단순 재전송도 처벌 대상이 될 수 있습니다. 몰랐더라도 즉시 삭제하고, 심각한 경우 신고해야 합니다. 저장만 해도 문제가 될 수 있습니다.",edu:"illegal_content"},{id:7,category:"개인정보 보호",icon:"🛡",question:"SNS 프로필에 공개해도 비교적 안전한 정보는 무엇인가요?",options:["전화번호와 현재 위치","취미나 관심사 등 일반적인 정보","학교 이름과 졸업 연도","가족 관계와 가족 사진"],answer:1,explanation:"전화번호, 위치, 학교, 직장, 가족관계 등은 신원 도용이나 스토킹에 악용될 수 있습니다. SNS에는 개인 식별이 가능한 정보는 최소한으로만 공개해야 합니다.",edu:"privacy"},{id:8,category:"디지털 윤리 & AI",icon:"🤖",question:"친구 얼굴 사진을 AI 합성 서비스에 올려 재미있는 이미지를 만들어 공유했습니다. 무엇이 문제인가요?",options:["친구 사진이라 문제없다","동의 없이 타인 얼굴을 AI에 업로드하고 공유하는 것은 개인정보 침해 및 법적 문제가 될 수 있다","재미 목적이면 괜찮다","SNS 공개 사진을 사용하면 괜찮다"],answer:1,explanation:"타인의 얼굴을 동의 없이 AI 서비스에 업로드하는 것은 개인정보 침해입니다. 딥페이크·합성 이미지 제작·공유는 법적 처벌 대상이 될 수 있으며, '재미'나 '장난'이라는 이유는 면죄부가 되지 않습니다.",edu:"deepfake"},{id:9,category:"피해 대응",icon:"🚨",question:"SNS를 통한 사기 피해를 당했을 때 가장 먼저 해야 할 행동은?",options:["혼자 해결을 시도하며 상황을 지켜본다","관련 증거(캡처)를 보존하고, 금전 피해 시 금융기관에 지급정지를 요청한다","해당 플랫폼에서 상대방을 차단한다","피해 내용을 SNS에 공개한다"],answer:1,explanation:"피해 발생 시 즉시 증거를 캡처하고 보존해야 합니다. 금전 피해가 있다면 즉시 금융기관에 지급정지를 요청하고, 경찰청 사이버범죄 신고 시스템을 이용하세요.",edu:"response"},{id:10,category:"자가 점검",icon:"🔍",question:"다음 중 사이버 범죄에 해당할 수 있는 행동은?",options:["사실 확인 없이 자극적인 게시물을 공유하는 것","2단계 인증을 설정하는 것","출처 불명 링크를 클릭하지 않는 것","개인정보를 최소한으로 공개하는 것"],answer:0,explanation:"사실 확인 없이 허위·자극적 게시물을 공유하는 것은 명예훼손, 허위사실 유포에 해당할 수 있습니다. 나머지는 모두 올바른 보안 습관입니다.",edu:"selfcheck"}];

account:{title:"계정 탈취 & 보안",icon:"🔑",color:"#00d4ff",tag:"계정 보호",content:`<h4>계정 탈취란?</h4><p>비밀번호, 인증코드, 악성 링크 등을 이용해 SNS 계정을 빼앗는 범죄입니다.</p><h4>피해 사례</h4><ul><li>탈취된 계정으로 지인에게 금전 요구</li><li>불법 광고 업로드</li><li>개인정보 유출 및 악용</li></ul><h4>예방 방법</h4><ul><li><span class="chip green">필수</span> 2단계 인증(2FA) 사용</li><li>플랫폼마다 다른 비밀번호 사용</li><li>출처 불명 링크 주의</li></ul><div class="highlight">⚠️ 인증번호를 요구받으면 100% 사기입니다. 어떤 이유로도 공유하지 마세요.</div>`},

romance:{title:"로맨스 스캠",icon:"💔",color:"#ec4899",tag:"감정 조작 사기",content:`<h4>로맨스 스캠이란?</h4><p>온라인에서 호감을 형성한 뒤 금전 지원을 요구하는 사기입니다.</p><h4>주요 특징</h4><ul><li>빠른 친밀감 형성 (며칠 내 강한 애정 표현)</li><li>해외 근무·군인·사업가·의사 등 신원 확인 어려운 설정</li><li>갑작스러운 금전 요청</li></ul><div class="highlight">🚩 실제 만남 없이 금전을 요구한다면 무조건 의심하세요.</div><h4>예방 방법</h4><ul><li>화상통화 등으로 상대방 신원 확인 요청</li><li>어떤 이유로도 온라인에서 알게 된 사람에게 송금 금지</li></ul>`},

deepfake:{title:"딥페이크 & AI 악용",icon:"🤖",color:"#7c3aed",tag:"디지털 윤리",content:`<h4>딥페이크란?</h4><p>AI 기술로 타인의 얼굴이나 목소리를 합성하여 가짜 영상·이미지를 만드는 기술입니다.</p><h4>문제가 되는 행위</h4><ul><li>동의 없이 타인 얼굴을 AI 서비스에 업로드</li><li>합성 이미지·영상 제작 및 공유</li><li>"재미" 목적의 딥페이크도 법적 문제 발생 가능</li></ul><div class="highlight">⚠️ SNS에 공개된 사진이라도 무단으로 AI 합성에 사용하면 개인정보 침해입니다.</div><h4>법적 현황</h4><ul><li>성적 목적의 딥페이크는 형사처벌 대상</li><li>제작뿐 아니라 유포·소지도 처벌</li></ul>`},

};

let currentQ=0,score=0,answers=[],answered=false;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function startQuiz(){currentQ=0;score=0;answers=[];answered=false;showScreen('quiz');renderQuestion();}
function renderQuestion(){const q=QUESTIONS[currentQ];answered=false;document.getElementById('prog-text').textContent=`${currentQ+1} / ${QUESTIONS.length}`;const pct=Math.round((currentQ/QUESTIONS.length)*100);document.getElementById('prog-pct').textContent=pct+'%';document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('live-score').textContent=score;document.getElementById('category-tag').innerHTML=`${q.icon} ${q.category}`;document.getElementById('q-num').textContent=`문제 ${currentQ+1}`;document.getElementById('q-text').textContent=q.question;const letters=['A','B','C','D'];document.getElementById('options-list').innerHTML=q.options.map((opt,i)=>`<div class="option" id="opt-${i}" onclick="selectOption(${i})"><div class="opt-letter">${letters[i]}</div><div>${opt}</div></div>`).join('');document.getElementById('feedback-box').className='feedback-box';document.getElementById('next-btn').style.display='none';}
function selectOption(idx){if(answered)return;answered=true;const q=QUESTIONS[currentQ];const correct=q.answer===idx;if(correct)score+=10;answers.push({q,chosen:idx,correct});document.querySelectorAll('.option').forEach((el,i)=>{el.classList.add('disabled');if(i===q.answer)el.classList.add('correct');if(i===idx&&!correct)el.classList.add('wrong');});const fb=document.getElementById('feedback-box');fb.className='feedback-box show '+(correct?'correct-fb':'wrong-fb');document.getElementById('fb-title').textContent=correct?'✅ 정답입니다!':'❌ 오답입니다';document.getElementById('fb-content').textContent=q.explanation;document.getElementById('live-score').textContent=score;const nb=document.getElementById('next-btn');nb.style.display='flex';nb.textContent=currentQ<QUESTIONS.length-1?'다음 문제 →':'결과 보기 →';}
function nextQuestion(){currentQ++;if(currentQ>=QUESTIONS.length)showResult();else renderQuestion();}
function showResult(){showScreen('result');document.getElementById('r-score').textContent=score;const correct=answers.filter(a=>a.correct).length;const wrong=answers.length-correct;const pct=Math.round((correct/answers.length)*100);document.getElementById('r-correct').textContent=correct;document.getElementById('r-wrong').textContent=wrong;document.getElementById('r-pct').textContent=pct+'%';const circumference=427;const offset=circumference-(pct/100)*circumference;setTimeout(()=>{document.getElementById('ring-fill').style.transition='stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1)';document.getElementById('ring-fill').style.strokeDashoffset=offset;},100);let grade,desc;if(score>=90){grade='🏆 사이버 보안 전문가 수준!';desc='뛰어난 사이버 보안 인식을 보유하고 있습니다. 주변 사람들에게도 알려주세요!';}else if(score>=70){grade='🛡 기본 보안 의식 양호';desc='기본적인 보안 의식은 있지만 일부 허점이 있습니다. 아래 교육 자료로 보완해보세요.';}else if(score>=50){grade='⚠️ 보안 인식 보완 필요';desc='사이버 범죄에 노출될 위험이 있습니다. 아래 교육 자료를 꼭 확인하세요.';}else{grade='🚨 보안 교육이 시급합니다';desc='사이버 범죄 피해를 입을 위험이 높습니다. 아래 교육 자료를 반드시 확인해주세요.';}
document.getElementById('r-grade').textContent=grade;document.getElementById('r-desc').textContent=desc;const wrongItems=answers.filter(a=>!a.correct);const wra=document.getElementById('wrong-review-area');if(wrongItems.length>0){const letters=['A','B','C','D'];wra.innerHTML=`<div class="wrong-review"><h3>❌ 틀린 문제 복습 (${wrongItems.length}개)</h3>${wrongItems.map(a=>`<div class="wrong-item"><div class="wrong-q">Q. ${a.q.question}</div><div class="wrong-ans">내 답변: ${letters[a.chosen]}. ${a.q.options[a.chosen]}</div><div class="wrong-correct">정답: ${letters[a.q.answer]}. ${a.q.options[a.q.answer]}</div></div>`).join('')}</div>`;}else{wra.innerHTML='<div style="text-align:center;padding:20px;color:#34d399;font-weight:700;font-size:18px">🎉 모두 정답! 완벽합니다!</div>';}
const wrongEduKeys=[...new Set(wrongItems.map(a=>a.q.edu))];const allEduKeys=[...new Set(QUESTIONS.map(q=>q.edu))];const orderedKeys=[...wrongEduKeys,...allEduKeys.filter(k=>!wrongEduKeys.includes(k))];document.getElementById('edu-sections').innerHTML=orderedKeys.map((key,i)=>{const edu=EDU_DATA[key];const isWrong=wrongEduKeys.includes(key);return`<div class="edu-section ${i===0?'open':''}" id="edu-${key}"><div class="edu-header" onclick="toggleEdu('${key}')"><div class="edu-header-left"><div class="edu-icon" style="background:${edu.color}22;color:${edu.color}">${edu.icon}</div><div><div class="edu-title">${edu.title}${isWrong?' <span style="color:#ef4444;font-size:11px">● 오답 관련</span>':''}</div><div class="edu-tag">${edu.tag}</div></div></div><div class="edu-chevron">▾</div></div><div class="edu-body">${edu.content}</div></div>`;}).join('');}
function toggleEdu(key){document.getElementById('edu-'+key).classList.toggle('open');}
async function shareResult(){const s=document.getElementById('r-score').textContent;const text=`🛡 SNS 사이버범죄 퀴즈 결과\n\n내 점수: ${s}점!\n나의 사이버 보안 인식 수준은? 당신도 테스트해보세요.`;if(navigator.share){try{await navigator.share({title:'SNS 사이버범죄 퀴즈',text});}catch(e){copyLink();}}else{copyLink();}}
function copyLink(){navigator.clipboard.writeText(window.location.href).then(()=>{const a=document.getElementById('copy-alert');a.style.display='block';setTimeout(()=>a.style.display='none',2500);}).catch(()=>{alert('링크: '+window.location.href);});}
function restartQuiz(){startQuiz();}
</script>
